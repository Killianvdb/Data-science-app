services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: datasci-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - datasci_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-appuser} -d ${DB_DATABASE:-laravel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: datasci-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - datasci_net
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  # PHP/Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datasci-app
    restart: always
    working_dir: /app
    environment:
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./:/app
      - app_storage:/app/storage
      - app_bootstrap:/app/bootstrap/cache
      - ./storage/app/python_data:/app/python_shared_data
    networks:
      - datasci_net
    depends_on:
      - postgres
      - redis

  # Python Data Science Service
  python_service:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: datasci-python
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    volumes:
      - ./python_scripts:/app/python_scripts:ro
      - shared_data:/app/data
      - ./storage/app/python_data:/app/python_shared_data
    networks:
      - datasci_net
    # This keeps the container running so Laravel can "exec" into it
    command: ["tail", "-f", "/dev/null"]

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: datasci-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./:/app:ro # Critical for CSS/JS access
    networks:
      - datasci_net
    depends_on:
      - app

  # PgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datasci-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - datasci_net
    depends_on:
      - postgres

networks:
  datasci_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app_storage:
  app_bootstrap:
  shared_data:
