[www]
user = appuser
group = appuser
listen = 0.0.0.0:9000
listen.allowed_clients = 127.0.0.1,::1

; Process management
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Logging
access.log = /proc/self/fd/2
slowlog = /proc/self/fd/2

; Security
catch_workers_output = yes
decorate_workers_output = no